services:
  postgres:
    image: postgres:16-alpine
    container_name: contract-review-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-contract_review}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-contract_review}
      POSTGRES_DB: ${POSTGRES_DB:-contract_review}
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  onlyoffice:
    image: onlyoffice/documentserver
    container_name: contract-review-onlyoffice
    restart: always
    ports:
      - "8081:80"
    environment:
      - JWT_ENABLED=true
      - JWT_SECRET=${ONLYOFFICE_JWT_SECRET:-change-me-onlyoffice-jwt-secret}
      - JWT_IN_BODY=true
      - JWT_HEADER=Authorization
    volumes:
      - ./data/onlyoffice/data:/var/www/onlyoffice/Data
      - ./data/onlyoffice/logs:/var/log/onlyoffice
      - ./data/onlyoffice/lib:/var/lib/onlyoffice
      - ./data/onlyoffice/db:/var/lib/postgresql

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: contract-review-milvus-etcd
    restart: always
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
    command: >
      etcd
      --advertise-client-urls=http://contract-review-milvus-etcd:2379
      --listen-client-urls=http://0.0.0.0:2379
    volumes:
      - ./data/milvus/etcd:/etcd

  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: contract-review-milvus-minio
    restart: always
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    command: minio server /minio_data
    ports:
      - "9000:9000"
    volumes:
      - ./data/milvus/minio:/minio_data

  milvus:
    image: milvusdb/milvus:v2.4.4
    container_name: contract-review-milvus
    restart: always
    depends_on:
      - milvus-etcd
      - milvus-minio
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      ETCD_ENDPOINTS: contract-review-milvus-etcd:2379
      MINIO_ADDRESS: contract-review-milvus-minio:9000
    volumes:
      - ./data/milvus/data:/var/lib/milvus
    command: ["milvus", "run", "standalone"]

networks:
  default:
    name: contract-review-milvus-network
